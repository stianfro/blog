theme: hugo-theme-yue
baseURL: https://blog.froystein.jp/
defaultContentLanguage: en
defaultContentLanguageInSubdir: true
enableGitInfo: false
enableEmoji: true
enableRobotsTXT: true

params:
  _merge: deep
  description: Practical notes about Kubernetes, OpenShift, container infrastructure, and cloud-native operations.
  rssFullContent: true
  homePagerSize: 5
  sectionPagerSize: 10000
  author: Stian Frøystein

frontmatter:
  lastmod: ["lastmod", ":default"] # lastmod in front matter has highest precedence

markup:
  _merge: deep
  goldmark:
    renderer:
      unsafe: true

languages:
  en:
    contentDir: content/en
    languageCode: en-US
    languageDirection: ltr
    languageName: English
    title: Stian Frøystein's Kubernetes Blog
    weight: 10
    menus:
      main:
        - name: Home
          pageRef: /
          weight: 10
        - name: Posts
          pageRef: /posts
          weight: 20
        - name: Tags
          pageRef: /tags
          weight: 30
        - name: About
          pageRef: /about
          weight: 40
        - name: Privacy
          pageRef: /privacy
          weight: 50
    params:
      dateFormat: Jan 02, 2006 # See https://gohugo.io/functions/time/format/
      footer:
        copyright:
          yearStart: 2025 # Optional
          author: Stian Frøystein

module:
  imports:
    - path: github.com/martignoni/hugo-notice

taxonomies:
  tag: tags
